<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>評語系統（可用最終版）</title>
<style>
body{font-family:Arial;padding:20px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
textarea{width:100%;height:120px}
button{margin:8px;padding:10px}
</style>
</head>
<body>

<h2>評語系統（確定可用）</h2>

<textarea id="names" placeholder="每行一個名字"></textarea><br>

<button onclick="build()">建立表格</button>
<button onclick="gen()">產生評語</button>

<div id="table"></div>
<pre id="out"></pre>

<script>

function build(){

  const aspects = ["學習態度","課堂專注","作業表現","學習動機","理解能力","表達能力","合作學習","人際關係","自我管理","學習成果"];

  let names = document.getElementById("names").value.split("\n");

  let html = "<table><tr><th>姓名</th>";

  aspects.forEach(a=>{
    html += "<th>"+a+"</th>";
  });

  html += "</tr>";

  names.forEach((n,i)=>{
    if(!n.trim()) return;

    html += "<tr><td>"+ n.slice(-2) +"</td>";

    for(let j=0;j<10;j++){
      html += "<td><select id='s_"+i+"_"+j+"'>";
      html += "<option value='3'>優</option>";
      html += "<option value='2'>中</option>";
      html += "<option value='1'>弱</option>";
      html += "</select></td>";
    }

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("table").innerHTML = html;
}

function gen(){

  let names = document.getElementById("names").value.split("\n");
  let out = "";

  const txt = {
    3:["表現積極","專注良好","作業完成良好"],
    2:["表現穩定","尚可","普通"],
    1:["需加強","需提升","仍待努力"]
  }

  names.forEach((n,i)=>{
    if(!n.trim()) return;

    let name = n.slice(-2);
    let parts = [];
    let total = 0;

    for(let j=0;j<10;j++){
      let el = document.getElementById('s_'+i+'_'+j);
      if(!el) continue;

      let v = parseInt(el.value);
      total += v;

      let arr = txt[v];
      parts.push(arr[Math.floor(Math.random()*arr.length)]);
    }

    let avg = total/10;

    let end = avg>=2.5 ? "表現優異"
            : avg>=1.8 ? "穩定進步"
            : "仍需努力";

    out += name + parts.join("，") + "，" + end + "。\n\n";
  });

  document.getElementById("out").innerText = out;
}

</script>

</body>
</html>
